<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - QuickPass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .nav-active {
            background: linear-gradient(to right, #eef2ff, #faf5ff);
            color: #4f46e5;
            border-right: 3px solid #4f46e5;
            font-weight: 700;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body
    class="bg-[#f4f7fb] text-slate-800 antialiased h-screen flex overflow-hidden selection:bg-indigo-100 selection:text-indigo-900">

    <aside
        class="w-64 bg-white/90 backdrop-blur-xl border-r border-slate-100 flex-shrink-0 flex flex-col h-full z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
        <div class="h-20 flex items-center px-8 gap-3">
            <div class="bg-gradient-to-br from-indigo-600 to-violet-600 p-2 rounded-xl shadow-md shadow-indigo-200">
                <i class="ph-bold ph-paper-plane-tilt text-white text-lg"></i>
            </div>
            <span class="font-bold text-xl text-slate-900 tracking-tight">QuickPass</span>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 space-y-2 px-4">
            <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Menu</p>
            <a href="student-dashboard.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl transition-all hover:translate-x-1">
                <i class="ph-bold ph-squares-four text-xl"></i><span class="text-sm font-semibold">Overview</span>
            </a>
            <a href="student-day-pass.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl transition-all hover:translate-x-1">
                <i class="ph-bold ph-sun text-xl"></i><span class="text-sm font-semibold">Apply Day Pass</span>
            </a>
            <a href="student-home-pass.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl transition-all hover:translate-x-1">
                <i class="ph-bold ph-house-line text-xl"></i><span class="text-sm font-semibold">Apply Home Pass</span>
            </a>
            <a href="pass-history.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-indigo-600 rounded-xl transition-all hover:translate-x-1">
                <i class="ph-bold ph-clock-counter-clockwise text-xl"></i><span class="text-sm font-semibold">Pass
                    History</span>
            </a>

            <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 mt-6">Settings</p>
            <a href="#" class="nav-active flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <i class="ph-fill ph-user-circle text-xl"></i><span class="text-sm">My Profile</span>
            </a>
        </nav>

        <div class="p-6">
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 text-slate-600 hover:text-red-600 bg-slate-50 hover:bg-red-50 py-3 rounded-xl transition-all text-sm font-bold border border-slate-100">
                <i class="ph-bold ph-sign-out"></i> Log Out
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-20 glass-panel border-b border-white flex items-center px-10 flex-shrink-0 z-10 gap-4">
            <div>
                <h2 class="text-xl font-bold text-slate-900 tracking-tight">Student Profile</h2>
                <p class="text-xs font-medium text-slate-500 mt-0.5">Manage your personal and security details.</p>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10">
            <div class="max-w-4xl mx-auto space-y-8">

                <div
                    class="bg-white rounded-3xl p-8 border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col md:flex-row items-center gap-6 relative overflow-hidden">
                    <div
                        class="absolute -right-10 -top-10 w-40 h-40 bg-gradient-to-br from-indigo-50 to-violet-50 rounded-full">
                    </div>

                    <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 flex items-center justify-center text-3xl font-bold text-white shadow-lg shadow-indigo-200 relative z-10"
                        id="profileInitials">JD</div>

                    <div class="text-center md:text-left relative z-10 flex-1">
                        <h1 class="text-2xl font-bold text-slate-900" id="profileName">Loading...</h1>
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mt-2">
                            <span
                                class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-xs font-bold font-mono border border-slate-200"
                                id="profileRoll">ID: ...</span>
                            <span
                                class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg text-xs font-bold border border-indigo-100"
                                id="profileRoom">Room: ...</span>
                        </div>
                    </div>
                </div>

                <form id="profileForm"
                    class="bg-white rounded-3xl p-8 border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] space-y-6">
                    <h3
                        class="text-base font-bold text-slate-900 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <i class="ph-fill ph-address-book text-indigo-500"></i> Contact Information</h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Student Phone</label>
                            <input type="tel" id="studentPhone"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all text-sm font-medium"
                                placeholder="Your mobile number">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Student Email</label>
                            <input type="email" id="studentEmail"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all text-sm font-medium"
                                placeholder="Your email address">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Parent/Guardian Phone <span
                                    class="text-xs text-amber-500 ml-1">(Requires Approval)</span></label>
                            <input type="tel" id="parentPhone"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all text-sm font-medium"
                                placeholder="Parent's mobile number">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Parent/Guardian Email <span
                                    class="text-xs text-amber-500 ml-1">(Requires Approval)</span></label>
                            <input type="email" id="parentEmail"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all text-sm font-medium"
                                placeholder="Parent's email address">
                        </div>
                    </div>

                    <div class="pt-6 mt-6 border-t border-slate-100 flex justify-end">
                        <button type="submit"
                            class="px-8 py-3 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transform hover:-translate-y-0.5 transition-all flex items-center gap-2">
                            Request Profile Update <i class="ph-bold ph-floppy-disk"></i>
                        </button>
                    </div>
                </form>

                <form id="passwordForm"
                    class="bg-white rounded-3xl p-8 border border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] space-y-6">
                    <h3
                        class="text-base font-bold text-slate-900 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <i class="ph-fill ph-lock-key text-slate-800"></i> Security Settings</h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Current Password</label>
                            <input type="password" id="currentPassword"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-500/30 focus:border-slate-500 transition-all text-sm font-medium"
                                placeholder="••••••••" required>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">New Password</label>
                            <input type="password" id="newPassword"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-500/30 focus:border-slate-500 transition-all text-sm font-medium"
                                placeholder="••••••••" required>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Confirm New Password</label>
                            <input type="password" id="confirmPassword"
                                class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-slate-500/30 focus:border-slate-500 transition-all text-sm font-medium"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="pt-6 mt-6 border-t border-slate-100 flex justify-end">
                        <button type="submit"
                            class="px-8 py-3 rounded-xl text-sm font-bold text-white bg-slate-800 hover:bg-slate-900 shadow-lg shadow-slate-200 hover:shadow-slate-300 transform hover:-translate-y-0.5 transition-all flex items-center gap-2">
                            Update Password <i class="ph-bold ph-shield-check"></i>
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isPreviewMode = urlParams.get('preview') === 'true';
            const userStr = localStorage.getItem('studentUser');
            let user;

            if (isPreviewMode && !userStr) {
                user = {
                    name: "John Doe",
                    rollNumber: "21BCE9999",
                    block: "BH-1",
                    room: "104"
                };
            } else {
                if (!userStr) {
                    window.location.href = 'student-login.html';
                    return;
                }
                user = JSON.parse(userStr);
            }

            // Populate Profile Header
            document.getElementById('profileName').textContent = user.name || "Student Name";
            document.getElementById('profileRoll').textContent = "ID: " + (user.rollNumber || "N/A");
            document.getElementById('profileRoom').textContent = `Room: ${user.block || ''} - ${user.room || ''}`;

            // Set Avatar Initials (First 2 letters)
            if (user.name) {
                const initials = user.name.substring(0, 2).toUpperCase();
                document.getElementById('profileInitials').textContent = initials;
            }
        });

        // Handle Profile Update Request
        document.getElementById('profileForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin mr-2"></i> Submitting...';
            btn.disabled = true;

            setTimeout(() => {
                alert("Update request sent to Warden successfully!");
                btn.innerHTML = 'Request Profile Update <i class="ph-bold ph-floppy-disk"></i>';
                btn.disabled = false;
            }, 1000);
        });

        // Handle Password Update
        document.getElementById('passwordForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            // Validation Check
            if (newPass !== confirmPass) {
                alert("New Password and Confirm Password do not match!");
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin mr-2"></i> Updating...';
            btn.disabled = true;

            setTimeout(() => {
                alert("Password updated successfully!");
                this.reset(); // Clear the form fields
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1000);
        });

        function logout() {
            localStorage.removeItem('studentUser');
            window.location.href = 'student-login.html';
        }
    </script>
</body>

</html>
