<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Login - QuickPass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col relative overflow-hidden">

    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-100 via-white to-purple-50">
        </div>
        <div
            class="absolute -top-24 -right-24 w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30">
        </div>
        <div
            class="absolute top-48 -left-24 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30">
        </div>
    </div>

    <nav class="w-full h-20 flex items-center justify-between px-6 lg:px-12 z-10 relative">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-slate-700 to-slate-900 p-2 rounded-xl shadow-lg shadow-slate-300">
                <i class="ph-bold ph-scan text-white text-xl"></i>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-800">QuickPass <span
                    class="text-slate-500">Security</span></span>
        </div>
        <a href="landing.html"
            class="text-sm font-semibold text-slate-500 hover:text-indigo-600 transition flex items-center gap-2 bg-white/50 px-4 py-2 rounded-full backdrop-blur-sm border border-white/60">
            <i class="ph-bold ph-arrow-left"></i> Back to Home
        </a>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4 z-10 relative">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-slate-900 tracking-tight">Security Gate</h1>
            <p class="mt-3 text-slate-500 font-medium">Access scanner and entry logs.</p>
        </div>

        <div
            class="w-full max-w-[420px] bg-white/70 backdrop-blur-xl rounded-3xl shadow-[0_20px_40px_rgba(0,0,0,0.04)] border border-white/80 overflow-hidden relative p-8 sm:p-10">

            <form id="securityLoginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Gate / Guard ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="ph-fill ph-identification-badge text-slate-400 text-lg"></i>
                        </div>
                        <input type="text" id="guardId"
                            class="block w-full pl-11 pr-4 py-3 bg-white/50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all sm:text-sm font-medium"
                            placeholder="e.g. GATE-01">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Passcode</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="ph-fill ph-numpad text-slate-400 text-lg"></i>
                        </div>
                        <input type="password" id="passcode"
                            class="block w-full pl-11 pr-11 py-3 bg-white/50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all sm:text-sm font-medium"
                            placeholder="••••">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
                            <i class="ph-bold ph-eye text-slate-400 hover:text-indigo-600 transition-colors"></i>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" type="checkbox"
                            class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded cursor-pointer">
                        <label for="remember-me"
                            class="ml-2 block text-sm font-medium text-slate-600 cursor-pointer">Remember me</label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Need
                            Help?</a>
                    </div>
                </div>

                <button type="submit"
                    class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-slate-800 to-slate-900 hover:from-slate-900 hover:to-black shadow-lg shadow-slate-300 hover:shadow-slate-400 transform hover:-translate-y-0.5 transition-all duration-200 mt-4">
                    Launch Scanner <i class="ph-bold ph-qr-code ml-2"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100">
                <div class="flex flex-col items-center justify-center gap-3">
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-wider">System Status</span>
                    <div
                        class="flex items-center gap-2 bg-white/60 px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                        <span class="relative flex h-2.5 w-2.5">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                        </span>
                        <span class="text-xs font-bold text-slate-700">All Systems Operational</span>
                    </div>
                </div>
            </div>
        </div>

        <p class="mt-10 text-center text-xs font-medium text-slate-500">
            &copy; 2026 QuickPass Management System.<br>Unauthorized access is prohibited.
        </p>
    </main>

    <script>
        document.getElementById('securityLoginForm').addEventListener('submit', function (event) {
            event.preventDefault(); // Stop page reload

            const guardId = document.getElementById('guardId').value;
            const passcode = document.getElementById('passcode').value;
            const button = this.querySelector('button[type="submit"]');

            if (!guardId || !passcode) {
                alert("Please enter both Gate/Guard ID and Passcode.");
                return;
            }

            // UI Loading State
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="ph-bold ph-spinner animate-spin mr-2"></i> Authenticating...';
            button.disabled = true;

            // Simulate backend validation & save dummy data to local storage
            setTimeout(() => {
                const securityUser = {
                    guardId: guardId,
                    name: "Guard Active",
                    gate: "Main Gate 1"
                };
                localStorage.setItem('securityUser', JSON.stringify(securityUser));

                // Redirect to the Security Dashboard
                window.location.href = 'gate-dashboard.html';
            }, 1000);
        });
    </script>
</body>

</html>
